name: Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly dep updates (Sunday midnight UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Update dependencies and commit ────────────────────────────────
  update-deps:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.result.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm ci

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Install Tailwind CLI
        run: mage tailwindUpdate

      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy
          go mod edit -go=$(go version | sed -n 's/.*go\([0-9.]*\).*/\1/p')

      - name: Update Go version in README
        run: |
          GO_VER=$(sed -n 's/^go \([0-9]*\.[0-9]*\).*/\1/p' go.mod)
          sed -i "s/- Go [0-9]\+\.[0-9]\++ (latest)/- Go ${GO_VER}+ (latest)/" README.md

      - name: Update vendored assets
        run: mage updateAssets

      - name: Compile Tailwind CSS
        run: mage tailwind

      - name: Check for changes
        id: check-changes
        run: |
          git add go.mod go.sum README.md web/assets/public/
          if git diff --staged --quiet; then
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update dependencies and vendored assets [skip-ci]" \
            --author="${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
          git stash push -u -m "ci: build artifacts"
          git pull --rebase origin main
          git push origin main

      - name: Output current SHA
        id: result
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT


  # ── Stage 2: Build and test (parallel) ─────────────────────────────────────
  go-test:
    needs: [update-deps]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-deps.outputs.sha }}

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Generate templ files
        run: go tool templ generate

      - name: Fix field alignment
        run: go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@latest && fieldalignment -fix ./...

      - name: Lint
        run: golangci-lint run

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -timeout 10m $(go list ./... | grep -v /tests)

      - name: Integration tests
        run: go test -timeout 15m ./tests/

  js-lint:
    needs: [update-deps]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-deps.outputs.sha }}

      - name: Install oxlint
        run: |
          curl -sSf https://oxc.rs/install.sh | sh

      - name: Lint JavaScript
        run: $HOME/.local/bin/oxlint web/assets/public/js/

  e2e-test:
    needs: [update-deps]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-deps.outputs.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate templ files
        run: go tool templ generate

      - name: Build Go binary
        run: go build -o dothog .

      - name: Run e2e tests
        run: npx playwright test --config e2e/playwright.config.ts
        env:
          APP_BINARY: dothog

      - name: Upload test report
        uses: actions/upload-artifact@v6
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Stage 3: Post-test (parallel, after both tests pass) ───────────────────
  docs:
    needs: [update-deps, go-test, e2e-test, js-lint]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-deps.outputs.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tools
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          pip install mkdocs mkdocs-material

      - name: Generate package docs
        run: scripts/gen_docs.sh

      - name: Build site
        run: mkdocs build -f docs/mkdocs.yml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-harmony:
    needs: [update-deps, go-test, e2e-test, js-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dothog
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-deps.outputs.sha }}
          path: dothog

      - name: Checkout or init harmony
        run: |
          if git clone https://x-access-token:${{ secrets.HARMONY_CI }}@github.com/catgoose/harmony.git harmony 2>/dev/null; then
            cd harmony
            git rm -rf . > /dev/null 2>&1 || true
          else
            mkdir harmony
            cd harmony
            git init
            git remote add origin https://x-access-token:${{ secrets.HARMONY_CI }}@github.com/catgoose/harmony.git
          fi

      - name: Sync files to harmony
        run: |

          # Copy dothog files (exclude .git)
          rsync -a --exclude='.git' dothog/ harmony/

          cd harmony

          # Swap README
          cp README.harmony.md README.md
          rm README.harmony.md

          # Swap in harmony-specific workflows (no sync-harmony or PR checks)
          mv .github/harmony/pipeline.yml .github/workflows/pipeline.yml
          mv .github/harmony/release.yml .github/workflows/release.yml
          rm -rf .github/harmony
          rm -f MANIFESTO.md

          # Replace Go module path in all source files (include .templ so
          # templ generate produces correct imports in harmony's CI)
          find . \( -name '*.go' -o -name '*.templ' \) -exec sed -i 's|catgoose/dothog|catgoose/harmony|g' {} +
          sed -i 's|catgoose/dothog|catgoose/harmony|g' go.mod

          # Scrub binary name references (workflows, Dockerfile, and files with literal "dothog")
          sed -i 's/dothog/harmony/g' .github/workflows/*.yml Dockerfile magefile.go internal/logger/logger.go
          find . -not -name '*.go' -not -name '*.templ' -type f -exec grep -l 'Dothog' {} + | xargs -r sed -i 's/Dothog/Harmony/g'
          find . -not -name '*.go' -not -name '*.templ' -type f -exec grep -l 'DOTHOG' {} + | xargs -r sed -i 's/DOTHOG/HARMONY/g'

      - name: Push to harmony
        run: |
          cd harmony
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "harmonizing the Hodge with the Podge"
          git push origin main

  # ── Notify on pipeline failure ──────────────────────────────────────────────
  notify-failure:
    if: ${{ failure() }}
    needs: [update-deps, go-test, e2e-test, js-lint, docs, sync-harmony]
    runs-on: ubuntu-latest
    steps:
      - name: Notify CI failure
        run: |
          BODY="**Workflow:** \`${{ github.workflow }}\`
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** ${{ github.actor }}"

          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "ci" \
            --state all \
            --limit 1 \
            --json number,state \
            --jq '.[0]')

          if [ -z "$EXISTING" ] || [ "$EXISTING" = "null" ]; then
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Pipeline failure: ${{ github.workflow }}" \
              --label "ci" \
              --body "$BODY"
          else
            NUMBER=$(echo "$EXISTING" | jq -r '.number')
            STATE=$(echo "$EXISTING" | jq -r '.state')
            if [ "$STATE" = "CLOSED" ]; then
              gh issue reopen "$NUMBER" --repo "${{ github.repository }}"
            fi
            gh issue comment "$NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
